name: openvino-hello-query-sample # you probably want to 'snapcraft register <name>'
base: core20 # the base snap is the execution environment for this snap
version: '1.0' # just for humans, typically '1.2+git' or '1.3.2'
summary: OpenVINO sample application # 79 char long summary
description: |
  OpenVINO sample application.

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots

parts:
  dependencies-part:
    plugin: nil
    build-packages:
    - libgflags-dev
    - mc
    stage-packages:
    - libgflags2.2
    # build-snaps:
    # - openvino/latest/beta
    stage-snaps:
    - openvino/latest/beta

  cmake-build-part:
    after: [dependencies-part]
    plugin: cmake
    source: ${SNAPCRAFT_PROJECT_DIR}
    source-type: local
    build-environment:
    - SNAPCRAFT_PARALLEL_BUILD_COUNT: "8"
    cmake-parameters:
    - -DCMAKE_BUILD_TYPE=Release
    - -DCPACK_GENERATOR=DEB
    - -DCMAKE_INSTALL_PREFIX=/usr
    - -DCMAKE_VERBOSE_MAKEFILE=ON
      # - -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
      # - -DCMAKE_C_COMPILER_LAUNCHER=ccache
    cmake-generator: "Unix Makefiles"
    stage-snaps:
    - openvino/latest/beta

plugs:
  openvino-2022-2-0:
    interface: content
    content: openvino-2022-2-0
    target: $SNAP/usr/lib/x86_64-linux-gnu

apps:
  hello-query-device:
    command: usr/bin/hello_query_device
